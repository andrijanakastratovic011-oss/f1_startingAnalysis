services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"

  airflow-webserver:
    image: apache/airflow:2.10.5-python3.11
    command: bash -c "sleep 10 && airflow db init && airflow users create --username airflow --password airflow --firstname Andrijana --lastname K --role Admin --email andrijana@example.com || true && airflow webserver"
    depends_on:
      - postgres
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      # AUTOMATSKA INSTALACIJA BIBLIOTEKA ZA TVOJE SKRIPTE:
      _PIP_ADDITIONAL_REQUIREMENTS: "pandas sqlalchemy"
    ports:
      - "8081:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./.env:/opt/airflow/.env
      - ./bronze:/opt/airflow/bronze
      - ./silver:/opt/airflow/silver
      - ./gold:/opt/airflow/gold

  airflow-scheduler:
    image: apache/airflow:2.10.5-python3.11
    command: bash -c "sleep 15 && airflow scheduler"
    depends_on:
      - postgres
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      # ISTO I ZA SCHEDULER (JER ON IZVRŠAVA TASKOVE):
      _PIP_ADDITIONAL_REQUIREMENTS: "pandas sqlalchemy"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./.env:/opt/airflow/.env
      - ./bronze:/opt/airflow/bronze
      - ./silver:/opt/airflow/silver
      - ./gold:/opt/airflow/gold
